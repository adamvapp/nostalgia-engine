openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: RetroSpace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile operations
  - name: buddies
    description: Buddy list operations
  - name: shoutbox
    description: Shoutbox/chat operations
  - name: profile
    description: Profile customization
  - name: status
    description: Online status operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "409":
          description: Username taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{username}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user profile
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user profile
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{username}/mood:
    patch:
      operationId: updateMood
      tags: [users]
      summary: Update user mood
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMoodBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /session/login:
    post:
      operationId: login
      tags: [users]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /session/logout:
    post:
      operationId: logout
      tags: [users]
      summary: Log out
      responses:
        "200":
          description: Logged out

  /session/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current logged-in user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /buddies/{username}:
    get:
      operationId: getBuddyList
      tags: [buddies]
      summary: Get buddy list for user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Buddy list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BuddyEntry"
    post:
      operationId: addBuddy
      tags: [buddies]
      summary: Add a buddy
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddBuddyBody"
      responses:
        "201":
          description: Buddy added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuddyEntry"

  /buddies/{username}/{buddyUsername}:
    delete:
      operationId: removeBuddy
      tags: [buddies]
      summary: Remove a buddy
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: buddyUsername
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed

  /shoutbox:
    get:
      operationId: getShoutbox
      tags: [shoutbox]
      summary: Get shoutbox messages
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShoutboxMessage"
    post:
      operationId: postShout
      tags: [shoutbox]
      summary: Post a shoutbox message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostShoutBody"
      responses:
        "201":
          description: Message posted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoutboxMessage"

  /shoutbox/{id}:
    delete:
      operationId: deleteShout
      tags: [shoutbox]
      summary: Delete a shoutbox message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted

  /messages/{username}/inbox:
    get:
      operationId: getInbox
      tags: [messages]
      summary: Get all conversations for a user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /messages/{username}/{otherUsername}:
    get:
      operationId: getConversation
      tags: [messages]
      summary: Get messages between two users
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: otherUsername
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DirectMessage"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a direct message
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: otherUsername
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectMessage"

  /messages/{username}/{otherUsername}/read:
    post:
      operationId: markRead
      tags: [messages]
      summary: Mark messages from otherUsername as read
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
        - name: otherUsername
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Marked as read

  /online-users:
    get:
      operationId: getOnlineUsers
      tags: [status]
      summary: Get recently active users
      responses:
        "200":
          description: Online users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{username}/ping:
    post:
      operationId: pingUser
      tags: [status]
      summary: Update last seen timestamp for user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pinged

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
        bio:
          type: string
          nullable: true
        mood:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        profileColor:
          type: string
          nullable: true
        profileSong:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        interests:
          type: string
          nullable: true
        isOnline:
          type: boolean
        lastSeen:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - displayName
        - isOnline
        - lastSeen
        - createdAt

    UserProfile:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          properties:
            buddyCount:
              type: integer
          required:
            - buddyCount

    CreateUserBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        displayName:
          type: string
      required:
        - username
        - password
        - displayName

    UpdateUserBody:
      type: object
      properties:
        displayName:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string
        profileColor:
          type: string
        profileSong:
          type: string
        location:
          type: string
        interests:
          type: string

    UpdateMoodBody:
      type: object
      properties:
        mood:
          type: string
          nullable: true
      required:
        - mood

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    BuddyEntry:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
        isOnline:
          type: boolean
        lastSeen:
          type: string
          format: date-time
        mood:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        profileColor:
          type: string
          nullable: true
      required:
        - id
        - username
        - displayName
        - isOnline
        - lastSeen

    AddBuddyBody:
      type: object
      properties:
        buddyUsername:
          type: string
      required:
        - buddyUsername

    ShoutboxMessage:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
        message:
          type: string
        color:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - displayName
        - message
        - createdAt

    PostShoutBody:
      type: object
      properties:
        username:
          type: string
        message:
          type: string
      required:
        - username
        - message

    DirectMessage:
      type: object
      properties:
        id:
          type: integer
        fromUsername:
          type: string
        toUsername:
          type: string
        message:
          type: string
        readAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - fromUsername
        - toUsername
        - message
        - createdAt

    Conversation:
      type: object
      properties:
        username:
          type: string
        displayName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        profileColor:
          type: string
          nullable: true
        isOnline:
          type: boolean
        lastMessage:
          type: string
        lastMessageAt:
          type: string
          format: date-time
        unreadCount:
          type: integer
      required:
        - username
        - displayName
        - isOnline
        - lastMessage
        - lastMessageAt
        - unreadCount

    SendMessageBody:
      type: object
      properties:
        message:
          type: string
      required:
        - message
